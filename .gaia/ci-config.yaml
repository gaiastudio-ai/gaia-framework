# Generated CI-scoped config slice — DO NOT EDIT BY HAND.
# Source: the canonical project-config.yaml (kept outside / gitignored within this repo).
# Regenerate: plugins/gaia/scripts/gen-ci-config.sh --config <canonical> --out .gaia/ci-config.yaml
# Carries ONLY CI-matrix inputs (stacks + ci_cd.promotion_chain + test_policy) —
# no secrets, no local paths, no environments/release/distribution. A CI lint
# regenerates this and fails on drift.
stacks:
  - name: gaia-core
    language: bash
    paths:
      - plugins/gaia/scripts/**
      - plugins/gaia/skills/**
      - plugins/gaia/agents/**
      - plugins/gaia/hooks/**
      - plugins/gaia/tools/**
      - plugins/gaia/config/**
      - plugins/gaia/schemas/**
      - plugins/gaia/rubrics/**
      - plugins/gaia/templates/**
      - plugins/gaia/knowledge/**
      - plugins/gaia/docs/**
      - plugins/gaia/tests/**
      - plugins/gaia/test/**
      - tests/**
      - scripts/**
      - .husky/**
      - commitlint.config.mjs
    test_cmd: "bash plugins/gaia/tests/run-with-coverage.sh"
  - name: gaia-docs
    language: bash
    paths:
      - documentation/**
    test_cmd: "bash plugins/gaia/scripts/run-docs-stack-tests.sh"
  - name: gaia-ci
    language: bash
    paths:
      - .github/**
    test_cmd: "bash .github/scripts/structure-validate.sh && bash .github/scripts/lint-skill-frontmatter.sh && bash .github/scripts/lint-agent-frontmatter.sh"
ci_cd:
  promotion_chain:
    - id: staging
      name: Staging
      branch: staging
      ci_provider: github_actions
      merge_strategy: squash
      ci_checks:
        - plugin-ci
        - selective-tests
    - id: main
      name: main
      branch: main
      ci_provider: github_actions
      merge_strategy: squash
      ci_checks:
        - plugin-ci
        - selective-tests
test_policy:
  retry_limit: 2
