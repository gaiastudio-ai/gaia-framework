name: selective-tests

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]

jobs:
  plan:
    name: plan
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.driver.outputs.matrix }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
        with:
          fetch-depth: 0

      - name: Determine trigger type
        id: trigger
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "type=pr" >> "$GITHUB_OUTPUT"
          else
            echo "type=push" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine promotion event
        id: promotion
        run: |
          # Safety Rail 3 (promotion-push wildcard): when a change is promoted
          # to the FINAL tier of the promotion chain, the full suite must run
          # — promotion merges are the last gate before production, where
          # cross-stack integration issues that were tested independently
          # during the per-stack PR phase get caught.
          #
          # The full-suite tier is DERIVED from ci_cd.promotion_chain (the last
          # tier's branch), never hard-coded — a project whose final tier is
          # named something other than "main" still escalates correctly, and a
          # project that promotes feature -> staging -> main runs narrow on
          # feature->staging and full only on staging->main.
          config_path=".gaia/config/project-config.yaml"
          final_branch=""
          if [[ -f "$config_path" ]] && command -v yq >/dev/null 2>&1; then
            final_branch="$(yq -r '.ci_cd.promotion_chain[-1].branch // ""' "$config_path" 2>/dev/null || echo "")"
          fi
          # Fallback: if the chain cannot be read, treat "main" as the final
          # tier so the rail still fires on the conventional promotion target.
          [[ -z "$final_branch" || "$final_branch" == "null" ]] && final_branch="main"

          # The base of a PR is its target branch; for a push it is the ref
          # being pushed to.
          base="${{ github.event.pull_request.base.ref || github.ref_name }}"
          if [[ "$base" == "$final_branch" ]]; then
            echo "is_promotion=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_promotion=false" >> "$GITHUB_OUTPUT"
          fi
          echo "[selective-tests] base=${base} final_tier=${final_branch} promotion=$([[ "$base" == "$final_branch" ]] && echo true || echo false)"

      - name: Collect changed files
        id: changes
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" > changed-files.txt
          else
            git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" > changed-files.txt
          fi
          echo "files=changed-files.txt" >> "$GITHUB_OUTPUT"

      - name: Run selective-test-driver
        id: driver
        run: |
          config_path=".gaia/config/project-config.yaml"
          if [[ ! -f "$config_path" ]]; then
            echo "[NOTICE] selective-tests: no project-config at ${config_path} — emitting empty matrix (reference workflow; configure .gaia/config/project-config.yaml in your project to enable)"
            echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
            # Write a full-deploy artifact so downstream consumers always
            # have a file to read, even when config is absent.
            echo '{"stacks":["*"]}' > affected-set.json
            exit 0
          fi
          # Safety Rail 3: a promotion to the final tier forces the full suite.
          # detect-affected.sh early-returns ["*"] on --event promotion-push,
          # before any changed-file inspection or per-trigger policy narrowing,
          # so include_stacks filters cannot reduce a promotion push.
          driver_extra=()
          if [[ "${{ steps.promotion.outputs.is_promotion }}" == "true" ]]; then
            driver_extra+=(--event promotion-push)
          fi
          matrix_json="$(plugins/gaia/scripts/selective-test-driver.sh \
            --config "$config_path" \
            --trigger "${{ steps.trigger.outputs.type }}" \
            "${driver_extra[@]}" \
            --files-from "${{ steps.changes.outputs.files }}")"
          echo "matrix=${matrix_json}" >> "$GITHUB_OUTPUT"

          # Extract affected stack names from the matrix JSON and write the
          # affected-set artifact. The artifact uses a simple schema:
          #   {"stacks": ["stack-a", "stack-b"]}
          # The wildcard sentinel ["*"] means "all stacks" (full deploy).
          # An empty array [] means "no stacks affected" (docs-only change).
          python3 -c "
          import json, sys
          matrix = json.loads(sys.argv[1])
          includes = matrix.get('include', [])
          stacks = [entry['stack'] for entry in includes if 'stack' in entry]
          # Preserve the wildcard if the pipeline escalated to all stacks
          if not stacks and sys.argv[1].strip() not in ('', '{\"include\":[]}'):
              stacks = ['*']
          json.dump({'stacks': stacks}, sys.stdout, separators=(',', ':'))
          " "$matrix_json" > affected-set.json

      - name: Upload affected-set artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: affected-set
          path: affected-set.json
          retention-days: 5
          if-no-files-found: warn

  test:
    name: test (${{ matrix.stack }})
    needs: plan
    if: needs.plan.outputs.matrix != '{"include":[]}' && needs.plan.outputs.matrix != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2

      - name: Run stack tests with retry
        run: |
          plugins/gaia/scripts/run-with-retry.sh \
            --test-id "${{ matrix.stack }}" \
            --flaky-list-file .gaia/config/flaky-tests.txt \
            -- plugins/gaia/scripts/run-stack-tests.sh \
              --config .gaia/config/project-config.yaml \
              "${{ matrix.stack }}"
