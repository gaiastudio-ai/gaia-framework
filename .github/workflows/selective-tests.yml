name: selective-tests

# PR-only. The pull_request event covers both legs: feature->staging PRs get the
# affected-set narrowing, and the staging->main promotion PR triggers the
# full-suite escalation (the promotion step reads github.event.pull_request.base.ref
# == final tier). The old push: trigger re-ran the same matrix on the post-merge
# commit — pure duplication on a squash-merge flow. Dropped.
on:
  pull_request:
    branches: [main, staging]

jobs:
  plan:
    name: plan
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.driver.outputs.matrix }}
      config_path: ${{ steps.cfg.outputs.config_path }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
        with:
          fetch-depth: 0

      - name: Determine trigger type
        id: trigger
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "type=pr" >> "$GITHUB_OUTPUT"
          else
            echo "type=push" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve project config
        id: cfg
        run: |
          # The project config is normally at the checkout root
          # (.gaia/config/project-config.yaml). But the supported
          # non-git-workspace layout puts .gaia/config/ one or more directories
          # ABOVE the git work tree (the published sub-tree is checked out as
          # the CI root). A repo-root-relative probe with no parent fallback
          # would miss it, take the "no config -> empty matrix" branch, and
          # silently run the FULL suite on every PR — defeating selective tests.
          #
          # Resolve via, in order: GAIA_CONFIG (explicit), the tracked in-repo
          # CI slice (.gaia/ci-config.yaml), CLAUDE_PROJECT_ROOT (project root),
          # then an upward walk from CWD. Mirrors how gaia-paths.sh /
          # resolve-config.sh resolve a config above a sub-tree.
          #
          # The .gaia/ci-config.yaml tier handles the layout where the canonical
          # config lives ABOVE the checkout root AND is untracked/gitignored
          # within the repo (so it is in NO checkout). A minimal, generated,
          # CI-scoped slice (stacks + ci_cd.promotion_chain + test_policy) is
          # committed at that path so CI resolves it at the checkout root. See
          # gen-ci-config.sh + the ci-config-slice drift lint.
          rel=".gaia/config/project-config.yaml"
          ci_slice=".gaia/ci-config.yaml"
          config_path=""
          location=""

          if [[ -n "${GAIA_CONFIG:-}" && -f "${GAIA_CONFIG}" ]]; then
            config_path="${GAIA_CONFIG}"; location="env:GAIA_CONFIG"
          elif [[ -f "${ci_slice}" ]]; then
            config_path="${ci_slice}"; location="ci-slice"
          elif [[ -n "${CLAUDE_PROJECT_ROOT:-}" && -f "${CLAUDE_PROJECT_ROOT}/${rel}" ]]; then
            config_path="${CLAUDE_PROJECT_ROOT}/${rel}"; location="env:CLAUDE_PROJECT_ROOT"
          else
            # Upward walk from the checkout root.
            dir="$PWD"
            while :; do
              if [[ -f "${dir}/${rel}" ]]; then
                config_path="${dir}/${rel}"
                [[ "$dir" == "$PWD" ]] && location="checkout-root" || location="parent:${dir}"
                break
              fi
              [[ "$dir" == "/" || -z "$dir" ]] && break
              dir="$(dirname -- "$dir")"
            done
          fi

          if [[ -n "$config_path" ]]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "config_path=${config_path}" >> "$GITHUB_OUTPUT"
            if [[ "$location" == "checkout-root" || "$location" == "ci-slice" || "$location" == "env:GAIA_CONFIG" ]]; then
              echo "[selective-tests] project config: ${config_path} (${location})"
            else
              # Present but NOT at the checkout root — a loud warning, because a
              # silent miss here is exactly the failure mode of #1606.
              echo "::warning::selective-tests: project config found via ${location} at ${config_path} (not the checkout root). Selective tests will run; if you expected the empty-matrix branch, check your checkout layout."
            fi
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "config_path=${rel}" >> "$GITHUB_OUTPUT"
            echo "[selective-tests] no project config found at the checkout root or any parent (looked for ${rel}; checked GAIA_CONFIG, CLAUDE_PROJECT_ROOT, and an upward walk)."
          fi

      - name: Determine promotion event
        id: promotion
        run: |
          # Safety Rail 3 (promotion-push wildcard): when a change is promoted
          # to the FINAL tier of the promotion chain, the full suite must run
          # — promotion merges are the last gate before production, where
          # cross-stack integration issues that were tested independently
          # during the per-stack PR phase get caught.
          #
          # The full-suite tier is DERIVED from ci_cd.promotion_chain (the last
          # tier's branch), never hard-coded — a project whose final tier is
          # named something other than "main" still escalates correctly, and a
          # project that promotes feature -> staging -> main runs narrow on
          # feature->staging and full only on staging->main.
          config_path="${{ steps.cfg.outputs.config_path }}"
          final_branch=""
          if [[ "${{ steps.cfg.outputs.found }}" == "true" ]] && command -v yq >/dev/null 2>&1; then
            final_branch="$(yq -r '.ci_cd.promotion_chain[-1].branch // ""' "$config_path" 2>/dev/null || echo "")"
          fi
          # Fallback: if the chain cannot be read, treat "main" as the final
          # tier so the rail still fires on the conventional promotion target.
          [[ -z "$final_branch" || "$final_branch" == "null" ]] && final_branch="main"

          # The base of a PR is its target branch; for a push it is the ref
          # being pushed to.
          base="${{ github.event.pull_request.base.ref || github.ref_name }}"
          if [[ "$base" == "$final_branch" ]]; then
            echo "is_promotion=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_promotion=false" >> "$GITHUB_OUTPUT"
          fi
          echo "[selective-tests] base=${base} final_tier=${final_branch} promotion=$([[ "$base" == "$final_branch" ]] && echo true || echo false)"

      - name: Collect changed files
        id: changes
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" > changed-files.txt
          else
            git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" > changed-files.txt
          fi
          echo "files=changed-files.txt" >> "$GITHUB_OUTPUT"

      - name: Run selective-test-driver
        id: driver
        run: |
          config_path="${{ steps.cfg.outputs.config_path }}"
          if [[ "${{ steps.cfg.outputs.found }}" != "true" ]]; then
            echo "[NOTICE] selective-tests: no project-config found at the checkout root or any parent — emitting empty matrix (reference workflow; add .gaia/config/project-config.yaml to your project, or set GAIA_CONFIG / CLAUDE_PROJECT_ROOT, to enable)"
            echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
            # Write a full-deploy artifact so downstream consumers always
            # have a file to read, even when config is absent.
            echo '{"stacks":["*"]}' > affected-set.json
            exit 0
          fi
          # Safety Rail 3: a promotion to the final tier forces the full suite.
          # detect-affected.sh early-returns ["*"] on --event promotion-push,
          # before any changed-file inspection or per-trigger policy narrowing,
          # so include_stacks filters cannot reduce a promotion push.
          driver_extra=()
          if [[ "${{ steps.promotion.outputs.is_promotion }}" == "true" ]]; then
            driver_extra+=(--event promotion-push)
          fi
          matrix_json="$(plugins/gaia/scripts/selective-test-driver.sh \
            --config "$config_path" \
            --trigger "${{ steps.trigger.outputs.type }}" \
            "${driver_extra[@]}" \
            --files-from "${{ steps.changes.outputs.files }}")"
          echo "matrix=${matrix_json}" >> "$GITHUB_OUTPUT"

          # Extract affected stack names from the matrix JSON and write the
          # affected-set artifact. The artifact uses a simple schema:
          #   {"stacks": ["stack-a", "stack-b"]}
          # The wildcard sentinel ["*"] means "all stacks" (full deploy).
          # An empty array [] means "no stacks affected" (docs-only change).
          python3 -c "
          import json, sys
          matrix = json.loads(sys.argv[1])
          includes = matrix.get('include', [])
          stacks = [entry['stack'] for entry in includes if 'stack' in entry]
          # Preserve the wildcard if the pipeline escalated to all stacks
          if not stacks and sys.argv[1].strip() not in ('', '{\"include\":[]}'):
              stacks = ['*']
          json.dump({'stacks': stacks}, sys.stdout, separators=(',', ':'))
          " "$matrix_json" > affected-set.json

      - name: Upload affected-set artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: affected-set
          path: affected-set.json
          retention-days: 5
          if-no-files-found: warn

  test:
    name: test (${{ matrix.stack }})
    needs: plan
    if: needs.plan.outputs.matrix != '{"include":[]}' && needs.plan.outputs.matrix != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2

      # The per-stack test command may be a bats suite (the bash-language
      # default is `bats <tests dir>`). Install bats so the test job can run it;
      # a reference workflow whose test job 127s on a bash/bats stack is broken
      # for every bats-using project. Projects on other stacks can add their own
      # toolchain setup step here (setup-node, setup-go, …) for their languages.
      # Pin bats >= 1.5.0 — suites that call `bats_require_minimum_version 1.5.0`
      # fail on the action's older default (1.2.1). Matches the dedicated bats job.
      - uses: mig4/setup-bats@af9a00deb21b5d795cabfeaa8d9060410377686d  # v1.2.0
        with:
          bats-version: 1.10.0

      - name: Run stack tests with retry
        run: |
          # Use the config the plan job resolved (GAIA_CONFIG / the tracked
          # .gaia/ci-config.yaml slice / CLAUDE_PROJECT_ROOT / upward-walk), not
          # a hard-coded path — run-stack-tests.sh reads the stack's test command
          # from it, so it must be the SAME config the matrix was built from.
          config_path="${{ needs.plan.outputs.config_path }}"
          [[ -n "$config_path" ]] || config_path=".gaia/config/project-config.yaml"
          plugins/gaia/scripts/run-with-retry.sh \
            --test-id "${{ matrix.stack }}" \
            --flaky-list-file .gaia/config/flaky-tests.txt \
            -- plugins/gaia/scripts/run-stack-tests.sh \
              --config "$config_path" \
              "${{ matrix.stack }}"
