# gaia-tools-image — build + publish the bundled deterministic-tools image.
#
# Publishes
# `ghcr.io/gaiastudio-ai/gaia-tools:<version>-<db-date>` for multi-arch
# (amd64 + arm64) so /gaia-doctor's `runner: docker` mode resolves
# Tier 2 tools from a single pinned image rather than asking each
# adopter to install grype + syft + spotbugs + … by hand.
#
# Triggers:
#   - push to main when the image source changes (manual rebuilds via UI too).
#   - monthly cron for vuln-DB freshness (1st of each month).
#   - workflow_dispatch for ad-hoc rebuilds.

name: gaia-tools-image

on:
  push:
    branches: [main]
    paths:
      - 'plugins/gaia/tools/gaia-tools/**'
      - '.github/workflows/gaia-tools-image.yml'
  schedule:
    # Monthly cadence for Grype DB freshness — 04:00 UTC on the 1st.
    - cron: '0 4 1 * *'
  workflow_dispatch:
    inputs:
      version:
        description: 'Override GAIA_TOOLS_VERSION tag (default: from Dockerfile ARG default)'
        required: false
        default: ''

permissions:
  contents: read
  packages: write          # required for ghcr push

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for cross-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tag
        id: tag
        run: |
          # Image tag shape: ghcr.io/<owner>/gaia-tools:<version>-<db-date>
          # Version comes from the Dockerfile ARG default unless overridden via
          # workflow_dispatch input; db-date is today's UTC date.
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(grep -E '^ARG GAIA_TOOLS_VERSION=' plugins/gaia/tools/gaia-tools/Dockerfile | head -1 | sed -E 's/^ARG GAIA_TOOLS_VERSION=([0-9.]+).*$/\1/')
          fi
          DB_DATE=$(date -u +%Y-%m-%d)
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          BASE="ghcr.io/${OWNER_LC}/gaia-tools"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "db_date=${DB_DATE}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${BASE}:${VERSION}-${DB_DATE}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${BASE}:latest" >> "$GITHUB_OUTPUT"
          echo "image_version_latest=${BASE}:${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build + push (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: plugins/gaia/tools/gaia-tools
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.tag.outputs.image_tag }}
            ${{ steps.tag.outputs.image_version_latest }}
            ${{ steps.tag.outputs.image_latest }}
          build-args: |
            GAIA_TOOLS_VERSION=${{ steps.tag.outputs.version }}
            GAIA_TOOLS_DB_DATE=${{ steps.tag.outputs.db_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test image (amd64)
        run: |
          IMG="${{ steps.tag.outputs.image_tag }}"
          docker pull --platform linux/amd64 "$IMG"
          docker run --platform linux/amd64 --rm "$IMG" --version
          docker run --platform linux/amd64 --rm "$IMG" --bom
          # Probe each bundled tool reports a version.
          for t in grype syft osv-scanner vulture pip-audit cyclonedx-bom cdxgen yamllint yq; do
            echo "::group::probe $t"
            docker run --platform linux/amd64 --rm "$IMG" "$t" --version 2>&1 | head -3 || \
              docker run --platform linux/amd64 --rm "$IMG" "$t" version 2>&1 | head -3 || true
            echo "::endgroup::"
          done

      - name: Summary
        run: |
          {
            echo "## gaia-tools image published"
            echo ""
            echo "- \`${{ steps.tag.outputs.image_tag }}\`"
            echo "- \`${{ steps.tag.outputs.image_version_latest }}\`"
            echo "- \`${{ steps.tag.outputs.image_latest }}\`"
            echo ""
            echo "Multi-arch: linux/amd64 + linux/arm64."
            echo ""
            echo "### Pull"
            echo ""
            echo "    docker pull ${{ steps.tag.outputs.image_tag }}"
          } >> "$GITHUB_STEP_SUMMARY"
