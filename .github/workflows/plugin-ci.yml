        run: .github/scripts/structure-validate.sh

  audit-v2-migration:
    name: audit-v2-migration
    runs-on: ubuntu-latest
    timeout-minutes: 5  # E28-S195 AC1 — harness takes ~20s warm; 5min is safe budget
    # E28-S195 — required regression gate for the B1/B2/B3/B4/B5 fixes shipped
    # in E28-S190/S191/S194/S196/S197/S198/S199/S200. Runs the audit harness
    # in --fixture-mode enriched (CI=true, set automatically by Actions, also
    # defaults to enriched per AC7). Exit 0 = all skills OK; exit 1 = plugin
    # regression (this job fails); exit 2 = harness bug (also fails, but CI
    # diagnostics distinguish the two — see scripts/audit-v2-migration.sh
    # header).
    #
    # Admins — add the job name `audit-v2-migration` to the GitHub branch-
    # protection required-status-checks list for both `main` and `staging`
    # via Settings → Branches → Branch protection rules. The toggle is a
    # manual UI step and cannot be scripted from this workflow.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
      - name: Prepare fixture project-root and plugin-cache
        run: |
          set -euo pipefail
          # Fixture project-root — a bare /tmp directory the harness populates
          # via --fixture-mode enriched. Keeps the repo checkout untouched.
          mkdir -p /tmp/audit-fixture/project-root
          # Plugin-cache — point at the in-repo plugin skills directory. The
          # harness iterates every subdir as a skill candidate.
          echo "PLUGIN_CACHE=$PWD/plugins/gaia/skills" >> "$GITHUB_ENV"
          echo "PROJECT_ROOT=/tmp/audit-fixture/project-root" >> "$GITHUB_ENV"
          echo "AUDIT_CSV=/tmp/audit-fixture/audit-result.csv" >> "$GITHUB_ENV"
      - name: Run audit-v2-migration harness (--fixture-mode enriched)
        run: |
          bash scripts/audit-v2-migration.sh \
            --plugin-cache "$PLUGIN_CACHE" \
            --project-root "$PROJECT_ROOT" \
            --fixture-mode enriched \
            --out "$AUDIT_CSV"
      - name: Upload audit CSV artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-v2-migration-csv
          path: /tmp/audit-fixture/audit-result.csv
          if-no-files-found: warn

  claudemd-drift-guard:
    name: claudemd-drift-guard
    runs-on: ubuntu-latest
    timeout-minutes: 2  # trivial diff check — keep the budget tight
    # E28-S165 — fails CI if gaia-public/CLAUDE.md drifts from its mirror.
    # Only gaia-public/CLAUDE.md is git-tracked in this repo; the project-root
    # mirror lives in each developer's workspace and is kept in sync manually
    # (per E28-S129 — gaia-public/CLAUDE.md is the source of truth). This CI
    # job runs the canonical guard script against the in-repo copy as a
    # self-diff: it protects against future changes that introduce a second
    # tracked CLAUDE.md and ensures the guard script itself never regresses.
    # Developers run the script locally with both paths to catch drift before
    # pushing; the bats suite exercises both scenarios end-to-end.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
      - name: Ensure drift-guard script is executable
        run: chmod +x plugins/gaia/scripts/claudemd-drift-guard.sh
      - name: Run CLAUDE.md drift guard (diff -q CLAUDE.md gaia-public/CLAUDE.md)
        run: |
          # Inside the gaia-public repo only ONE CLAUDE.md is tracked (at the
          # repo root). The project-root mirror sits outside this checkout.
          # The guard script invokes `diff -q CLAUDE.md CLAUDE.md` — a
          # self-diff that always passes — but still runs the full guard
          # code path so any regression in the script surfaces here. The
          # literal `diff -q CLAUDE.md gaia-public/CLAUDE.md` form lives in
          # the developer's local invocation (see plugins/gaia/scripts/claudemd-drift-guard.sh).
          plugins/gaia/scripts/claudemd-drift-guard.sh CLAUDE.md CLAUDE.md
