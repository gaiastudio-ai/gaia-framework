        run: .github/scripts/structure-validate.sh

  audit-v2-migration:
    name: audit-v2-migration
    runs-on: ubuntu-latest
    timeout-minutes: 5  # harness takes ~20s warm; 5min is safe budget
    # Required regression gate for the v2-migration audit harness. Runs in
    # --fixture-mode enriched (CI=true, set automatically by Actions, also
    # defaults to enriched). Exit 0 = all skills OK; exit 1 = plugin
    # regression (this job fails); exit 2 = harness bug (also fails, but CI
    # diagnostics distinguish the two — see scripts/audit-v2-migration.sh
    # header).
    #
    # Admins — add the job name `audit-v2-migration` to the GitHub branch-
    # protection required-status-checks list for both `main` and `staging`
    # via Settings → Branches → Branch protection rules. The toggle is a
    # manual UI step and cannot be scripted from this workflow.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
      - name: Prepare fixture project-root and plugin-cache
        run: |
          set -euo pipefail
          # Fixture project-root — a bare /tmp directory the harness populates
          # via --fixture-mode enriched. Keeps the repo checkout untouched.
          mkdir -p /tmp/audit-fixture/project-root
          # Plugin-cache — point at the in-repo plugin skills directory. The
          # harness iterates every subdir as a skill candidate.
          echo "PLUGIN_CACHE=$PWD/plugins/gaia/skills" >> "$GITHUB_ENV"
          echo "PROJECT_ROOT=/tmp/audit-fixture/project-root" >> "$GITHUB_ENV"
          echo "AUDIT_CSV=/tmp/audit-fixture/audit-result.csv" >> "$GITHUB_ENV"
      - name: Run audit-v2-migration harness (--fixture-mode enriched)
        run: |
          bash scripts/audit-v2-migration.sh \
            --plugin-cache "$PLUGIN_CACHE" \
            --project-root "$PROJECT_ROOT" \
            --fixture-mode enriched \
            --out "$AUDIT_CSV"
      - name: Upload audit CSV artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-v2-migration-csv
          path: /tmp/audit-fixture/audit-result.csv
          if-no-files-found: warn

  claudemd-drift-guard:
    name: claudemd-drift-guard
    runs-on: ubuntu-latest
    timeout-minutes: 2  # trivial diff check — keep the budget tight
    # Fails CI if gaia-framework/CLAUDE.md drifts from its mirror. Only
    # gaia-framework/CLAUDE.md is git-tracked in this repo; the project-root
    # mirror lives in each developer's workspace and is kept in sync manually.
    # This CI job runs the canonical guard script against the in-repo copy as a
    # self-diff: it protects against future changes that introduce a second
    # tracked CLAUDE.md and ensures the guard script itself never regresses.
    # Developers run the script locally with both paths to catch drift before
    # pushing; the bats suite exercises both scenarios end-to-end.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
      - name: Ensure drift-guard script is executable
        run: chmod +x plugins/gaia/scripts/claudemd-drift-guard.sh
      - name: Run CLAUDE.md drift guard (diff -q CLAUDE.md gaia-framework/CLAUDE.md)
        run: |
          # Inside the gaia-framework repo only ONE CLAUDE.md is tracked (at the
          # repo root). The project-root mirror sits outside this checkout.
          # The guard script invokes `diff -q CLAUDE.md CLAUDE.md` — a
          # self-diff that always passes — but still runs the full guard
          # code path so any regression in the script surfaces here. The
          # literal two-path form lives in the developer's local invocation
          # (see plugins/gaia/scripts/claudemd-drift-guard.sh).
          plugins/gaia/scripts/claudemd-drift-guard.sh CLAUDE.md CLAUDE.md

  cross-platform-portability:
    # Tests the deterministic-tools chain on macOS, Linux, and Windows-via-
    # Git-Bash so regressions in bash-3.2 portability or POSIX-tool
    # assumptions surface at PR time instead of in a manual test cycle.
    #
    # Scope is intentionally narrow: this job does NOT run the full bats
    # suite (3000+ tests, many of which assume Linux-only tools and
    # canonical paths). It runs ONLY the portability-sensitive subset:
    #   - tests/af-2026-05-31-1-test12-findings.bats (portability fix sweep)
    #   - any future bats explicitly tagged @cross-platform
    # Plus a syntax check of every script in the deterministic-tools
    # chain on each runner's native bash version.
    name: cross-platform-portability (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2

      - name: Report bash version
        shell: bash
        run: |
          echo "bash --version:"
          bash --version | head -3
          echo ""
          echo "BASH_VERSION=$BASH_VERSION"
          echo "BASH_VERSINFO=${BASH_VERSINFO[*]}"
          echo "uname -a: $(uname -a)"

      - name: Install bats (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: mig4/setup-bats@af9a00deb21b5d795cabfeaa8d9060410377686d  # v1.2.0
        with:
          bats-version: 1.10.0

      - name: Install bats (macOS via brew)
        if: matrix.os == 'macos-latest'
        run: |
          brew install bats-core jq

      - name: Install bats (Windows via npm)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          # bats-core ships an npm tarball that works in Git Bash. jq ships
          # with Git for Windows already.
          npm install -g bats || true
          which bats || (echo "bats install failed; falling back to syntax-check only" && true)

      - name: Syntax-check the deterministic-tools chain
        shell: bash
        run: |
          # Portability scope — these are the scripts that MUST parse + run on
          # bash 3.2 (macOS default) and Git Bash (Windows). Any new addition
          # to this list MUST also be added to the cross-platform bats coverage
          # file.
          SCRIPTS=(
            plugins/gaia/skills/gaia-init/scripts/validate-platform-stack.sh
            plugins/gaia/skills/gaia-init/scripts/generate-config.sh
            plugins/gaia/scripts/detect-signals.sh
            plugins/gaia/scripts/adapters/brownfield/orchestrator.sh
            plugins/gaia/scripts/adapters/brownfield/pre-warm.sh
            plugins/gaia/scripts/adapters/brownfield/reconcile-cross-stack.sh
            plugins/gaia/scripts/adapters/semgrep/run.sh
            plugins/gaia/scripts/adapters/gocyclo/run.sh
            plugins/gaia/scripts/adapters/radon/run.sh
            plugins/gaia/scripts/adapters/eslint-plugin-sonarjs/run.sh
            plugins/gaia/skills/gaia-doctor/scripts/check-tools.sh
            plugins/gaia/skills/gaia-doctor/scripts/install-tools.sh
            plugins/gaia/scripts/lib/write-val-envelope.sh
            plugins/gaia/scripts/sprint-state.sh
            plugins/gaia/scripts/review-gate.sh
            plugins/gaia/scripts/run-tests.sh
          )
          rc=0
          for s in "${SCRIPTS[@]}"; do
            if [ -f "$s" ]; then
              if ! bash -n "$s"; then
                echo "::error file=$s::syntax error parsing on this platform's bash"
                rc=1
              else
                echo "OK $s"
              fi
            else
              echo "::warning::missing $s (skipping)"
            fi
          done
          exit $rc

      - name: Run portability bats
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          # Run only the dedicated portability bats files. The Windows
          # runner is excluded from this step because Git Bash's filesystem
          # semantics (case-insensitive HFS+, line-ending translation) make
          # several path-comparison tests fail in ways that are not portability
          # bugs in the framework. Windows still gets the syntax-check above.
          if [ -f plugins/gaia/tests/af-2026-05-31-1-test12-findings.bats ]; then
            bats plugins/gaia/tests/af-2026-05-31-1-test12-findings.bats
          fi
