name: plugin-ci

# E28-S184 — bats-tests dormancy root-cause fix. Prior config triggered on
# PRs to `main` only, so the `bats-tests` job never ran on the sprint-24
# staging -> main sequence and the coverage wrapper's silent abort stayed
# hidden. Path filter `plugins/gaia/**` keeps noise low by scoping to the
# product source surface the wrapper actually guards.
on:
  pull_request:
    branches: [main, staging]
    paths:
      - 'plugins/gaia/**'
      - '.github/workflows/plugin-ci.yml'
      - 'scripts/audit-v2-migration.sh'
  push:
    branches: [main, staging]
    paths:
      - 'plugins/gaia/**'
      - '.github/workflows/plugin-ci.yml'
      - 'scripts/audit-v2-migration.sh'

jobs:
  frontmatter-lint:
    name: frontmatter-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
      - name: Lint SKILL.md frontmatter
        run: .github/scripts/lint-skill-frontmatter.sh
      - name: Lint agent frontmatter
        run: .github/scripts/lint-agent-frontmatter.sh

  bats-tests:
    name: bats-tests
    runs-on: ubuntu-latest
    # E28-S17 AC4 originally set this to 2 minutes, then E43-S5 bumped to 5
    # when the suite passed 1300 tests. Sprint-37 + sprint-38 grew the suite
    # past 3300 tests (E66/E67/E68/E69/E70 added 100+ new fixtures each
    # sprint). Raw bats is now consistently 4-5 minutes on CI; setup +
    # coverage upload push the job past the 5-minute wall on every push,
    # forcing rerun-or-admin-merge cycles. Bump to 8 minutes to absorb the
    # growth. The 240s soft budget enforced by bats-budget-watch.sh remains
    # the actionable signal for fixture authors. Revisit at ~6m raw bats.
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
      - uses: mig4/setup-bats@af9a00deb21b5d795cabfeaa8d9060410377686d  # v1.2.0
        with:
          bats-version: 1.10.0
      # E28-S175 — kcov is not in the default apt repositories on Ubuntu 24.04
      # (noble), which caused `apt-get install -y jq kcov` to fail with
      # "E: Unable to locate package kcov" on every PR and block the bats-tests
      # job before any tests ran. kcov-based line coverage is advisory-only in
      # run-with-coverage.sh (the script treats a missing kcov as a skip, not a
      # failure); the authoritative gate is NFR-052 public-function coverage,
      # which does not need kcov. Dropping kcov from the apt install restores
      # the bats-tests signal on noble. If line-coverage reporting is needed
      # later, reintroduce kcov via a pre-built binary download from the kcov
      # GitHub releases rather than apt.
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Run bats suite with coverage wrapper (budget-watched)
        # E45-S6 / AC3 — bats-budget-watch.sh wraps the coverage wrapper and
        # emits a structured warning to $GITHUB_STEP_SUMMARY when wall-clock
        # exceeds the threshold. Threshold (240s) is the soft budget — the
        # job's hard timeout above (5 min / 300s) remains the failing gate.
        # See ADR-062 / E45-S6-adr-memo-bats-scaling.md for the rationale and
        # plugins/gaia/docs/CI-NOTES.md for contributor guidance on adding
        # fixtures without breaking the budget.
        run: |
          bash plugins/gaia/scripts/bats-budget-watch.sh \
            --threshold-seconds 240 \
            --label bats-tests \
            -- bash plugins/gaia/tests/run-with-coverage.sh
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bats-coverage
          path: coverage/
          if-no-files-found: ignore

  skills-bats-tests:
    # E55-S5 — wires the dev-story skill bats files into CI. Until this job
    # landed, skill-level bats files (e.g., gaia-dev-story planning-gate
    # regression suite) lived only on disk and never gated PRs. The first
    # batch wired in covers the /gaia-dev-story V2 hardening regression
    # suite (E55-S1/S2/S3/S5). Other skill bats under tests/skills/ predate
    # this gate and have known unrelated failures (legacy lifecycle
    # conversion fixtures); those will be wired in by a separate sweep
    # once their failures are resolved.
    name: skills-bats-tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
      - uses: mig4/setup-bats@af9a00deb21b5d795cabfeaa8d9060410377686d  # v1.2.0
        with:
          bats-version: 1.10.0
      - name: Install jq and python3
        run: sudo apt-get update && sudo apt-get install -y jq python3
      - name: Run /gaia-dev-story skill bats suite
        run: |
          bats \
            tests/skills/gaia-dev-story-planning-gate.bats \
            tests/skills/gaia-dev-story-three-option-prompt.bats \
            tests/skills/gaia-dev-story-yolo-plan-loop.bats \
            tests/skills/gaia-dev-story-step2b-atdd.bats \
            tests/skills/gaia-dev-story-step7b-val.bats \
            tests/skills/gaia-dev-story-figma-degrade.bats \
            tests/skills/validate-plan-structure.bats \
            tests/skills/conditional-check-hints.bats
      - name: Run /gaia-add-feature assessment-doc-bypass-check bats suite
        # E83-S3 — anti-pattern check that scans every /gaia-add-feature
        # assessment-doc emission for three Val-gate bypass smoking-gun
        # strings (with backtick-tolerant regex). The bats file uses
        # synthetic fixtures under tests/fixtures/ and skips the
        # live-corpus tests (TC-VFC-10 / 6b) when GAIA_PROJECT_ROOT_DOCS
        # is unset — CI only checks out gaia-public/ and the live
        # assessment-AF-*.md corpus sits at project-root, OUTSIDE this
        # checkout (per CLAUDE.md "Non-git project-root workspace").
        # Step MUST FAIL the build on non-zero exit (TC-VFC-12).
        run: |
          bats plugins/gaia/skills/gaia-add-feature/tests/assessment-doc-bypass-check.bats
      - name: Run /gaia-add-feature no-priority-flag-auto-set bats suite
        # E83-S5 — regression-guard check that asserts the SKILL.md and
        # supporting scripts contain no conditional that auto-sets
        # `priority_flag: "next-sprint"` on stories created via cascade.
        # Guards user memory rule
        # `feedback_priority_flag_never_auto_set.md`: triage classifies
        # priority, /gaia-sprint-plan sequences. Auto-flagging at cascade
        # time pre-empts sprint-plan's authority.
        # Step MUST FAIL the build on non-zero exit.
        run: |
          bats plugins/gaia/skills/gaia-add-feature/tests/no-priority-flag-auto-set.bats
      - name: Run /gaia-meeting stdout-sentinel-forbid bats suite
        # E76-S15 — anti-pattern check that scans the /gaia-meeting SKILL.md
        # yield-boundary procedure sections for forbidden stdout-sentinel
        # patterns (`<<YIELD-STOP`, `<<TURN-END`). The script-side sentinel
        # mechanism was empirically defeated by harness Auto Mode on
        # 2026-05-09 (AI-2026-05-09-8 / memory rule
        # `feedback_askuserquestion_under_automode.md`); the substrate-
        # correct primitive is `AskUserQuestion` (lands in E76-S18, ADR-083
        # amendment AF-2026-05-10-1). The bats file uses synthetic fixtures
        # under tests/fixtures/ and the live SKILL.md as a forward-looking
        # guard.
        # Step MUST FAIL the build on non-zero exit (TC-MTG-AUQS-3).
        run: |
          bats plugins/gaia/skills/gaia-meeting/tests/gaia-meeting-stdout-sentinel-forbid.bats

  bats-script-refs-lint:
    # E28-S221 — sweep linter that catches bats files referencing scripts
    # that have been deleted from plugins/gaia/scripts/ or
    # plugins/gaia/skills/*/scripts/. Closes the cross-tree discoverability
    # gap surfaced by E59-S3 finding #1: the gaia-public/tests/ and
    # gaia-public/plugins/gaia/tests/ trees are disjoint (zero overlap)
    # but both ship and run in CI, so a script deletion under the
    # canonical scripts roots can leave dangling .bats references in
    # either tree. The linter is pure bash + awk, sub-second runtime.
    name: bats-script-refs-lint
    runs-on: ubuntu-latest
    timeout-minutes: 2  # trivial scan — keep budget tight
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
      - name: Run bats script-reference sweep linter
        run: |
          chmod +x plugins/gaia/scripts/lint-bats-script-refs.sh
          plugins/gaia/scripts/lint-bats-script-refs.sh --root .

  cluster-4-e2e:
    name: cluster-4-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 5  # E28-S39 AC4 — enforce 5-minute wall-clock budget
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
      - uses: mig4/setup-bats@af9a00deb21b5d795cabfeaa8d9060410377686d  # v1.2.0
        with:
          bats-version: 1.10.0
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Run Cluster 4 e2e tests
        run: bats tests/e2e/cluster-4-analysis-e2e.bats
      - name: Generate pass/fail report
        if: always()
        run: |
          chmod +x tests/e2e/generate-report.sh
          bash tests/e2e/generate-report.sh /tmp/cluster-4-report.md "$PWD"
          cat /tmp/cluster-4-report.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload e2e report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cluster-4-e2e-report
          path: /tmp/cluster-4-report.md
          if-no-files-found: ignore

  cluster-5-parity:
