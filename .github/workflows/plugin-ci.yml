name: plugin-ci

# Prior config triggered on PRs to `main` only, so the `bats-tests` job
# never ran on staging -> main sequences and the coverage wrapper's silent
# abort stayed hidden. Path filter `plugins/gaia/**` keeps noise low by
# scoping to the product source surface the wrapper actually guards.
on:
  pull_request:
    branches: [main, staging]
    paths:
      - 'plugins/gaia/**'
      - '.github/workflows/plugin-ci.yml'
      - 'scripts/audit-v2-migration.sh'
  push:
    branches: [main, staging]
    paths:
      - 'plugins/gaia/**'
      - '.github/workflows/plugin-ci.yml'
      - 'scripts/audit-v2-migration.sh'

jobs:
  frontmatter-lint:
    name: frontmatter-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
      - name: Lint SKILL.md frontmatter
        run: .github/scripts/lint-skill-frontmatter.sh
      - name: Lint agent frontmatter
        run: .github/scripts/lint-agent-frontmatter.sh

  bats-tests:
    name: bats-tests
    runs-on: ubuntu-latest
    # Timeout has been bumped progressively as the suite grew. The suite now
    # exceeds 7600 tests; raw bats runs 4-5 minutes on CI and setup + coverage
    # upload push past the previous cap on large cascade additions. The 240s
    # soft budget enforced by bats-budget-watch.sh remains the actionable
    # signal for fixture authors. Revisit if raw bats consistently exceeds
    # ~12 minutes.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
      - uses: mig4/setup-bats@af9a00deb21b5d795cabfeaa8d9060410377686d  # v1.2.0
        with:
          bats-version: 1.10.0
      # kcov is not in the default apt repositories on Ubuntu 24.04 (noble),
      # which caused `apt-get install -y jq kcov` to fail with "E: Unable to
      # locate package kcov" on every PR and block the bats-tests job before
      # any tests ran. kcov-based line coverage is advisory-only in
      # run-with-coverage.sh (the script treats a missing kcov as a skip, not a
      # failure); the authoritative gate is the public-function coverage check,
      # which does not need kcov. Dropping kcov from the apt install restores
      # the bats-tests signal on noble. If line-coverage reporting is needed
      # later, reintroduce kcov via a pre-built binary download from the kcov
      # GitHub releases rather than apt.
      - name: Install jq and GNU parallel
        # GNU parallel enables `bats --jobs` in run-with-coverage.sh, which runs
        # the 580+ test files concurrently and keeps the suite well under the
        # job timeout below. Without parallel the wrapper falls back to a serial
        # run that sits right at the 15-minute wall and tips into timeout flakes.
        run: sudo apt-get update && sudo apt-get install -y jq parallel
      - name: Run bats suite with coverage wrapper (budget-watched)
        # bats-budget-watch.sh wraps the coverage wrapper and emits a structured
        # warning to $GITHUB_STEP_SUMMARY when wall-clock exceeds the threshold.
        # Threshold (240s) is the soft budget — the job's hard timeout above
        # remains the failing gate. See plugins/gaia/docs/CI-NOTES.md for
        # contributor guidance on adding fixtures without breaking the budget.
        #
        # Default-skip @hardware-dependent tests in CI via
        # BATS_FILTER_TAGS='!hardware-dependent'. Tests tagged
        # @hardware-dependent exercise host-specific timing primitives (mtime
        # resolution, sleep precision, host-clock semantics) and were the
        # primary contributor to bats CI budget overrun. Developers MUST run
        # them locally before merge with:
        #   bats --filter-tags hardware-dependent <test-file>
        env:
          BATS_FILTER_TAGS: '!hardware-dependent'
        run: |
          bash plugins/gaia/scripts/bats-budget-watch.sh \
            --threshold-seconds 240 \
            --label bats-tests \
            -- bash plugins/gaia/tests/run-with-coverage.sh
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bats-coverage
          path: coverage/
          if-no-files-found: ignore

  skills-bats-tests:
    # Wires the dev-story skill bats files into CI. Until this job landed,
    # skill-level bats files (e.g., gaia-dev-story planning-gate regression
    # suite) lived only on disk and never gated PRs. Other skill bats under
    # tests/skills/ predate this gate and have known unrelated failures
    # (legacy lifecycle conversion fixtures); those will be wired in by a
    # separate sweep once their failures are resolved.
    name: skills-bats-tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
      - uses: mig4/setup-bats@af9a00deb21b5d795cabfeaa8d9060410377686d  # v1.2.0
        with:
          bats-version: 1.10.0
      - name: Install jq and python3
        run: sudo apt-get update && sudo apt-get install -y jq python3
      - name: Run tests/skills/*.bats coverage suite
        # Covers every tests/skills/*.bats file on staging that passes today.
        # Five legacy fixtures carry pre-existing assertion drift and are NOT
        # listed below — they will be wired in by their fixture-repair
        # follow-ups.
        #
        # The companion regression sentinel
        # `tests/skills/E55-S11-plugin-ci-bats-coverage.bats` enumerates the
        # required-vs-exempt classification and FAILS this job if a file is
        # added to tests/skills/ without being classified, or if an entry is
        # silently un-wired from this list. Keep the bats invocation below
        # and the REQUIRED_FILES array in the sentinel byte-equal — drift
        # between them is the regression vector this step closes.
        run: |
          bats \
            tests/skills/E28-S227-td74-gaia-config-csv-cleanup.bats \
            tests/skills/E55-S11-plugin-ci-bats-coverage.bats \
            tests/skills/E69-S1-rename-map.bats \
            tests/skills/E69-S3-test-strategy-collapse.bats \
            tests/skills/conditional-check-hints.bats \
            tests/skills/e28-s113-edge-cases-figma-conversion.bats \
            tests/skills/e28-s117-quick-dev-conversion.bats \
            tests/skills/e64-s3-transition-script-path-refs.bats \
            tests/skills/gaia-a11y-testing.bats \
            tests/skills/gaia-atdd-batch.bats \
            tests/skills/gaia-atdd.bats \
            tests/skills/gaia-ci-edit-hints.bats \
            tests/skills/gaia-config-ci-regenerate.bats \
            tests/skills/gaia-config-section-scope.bats \
            tests/skills/gaia-config-validate-schema.bats \
            tests/skills/gaia-config-yaml-editor.bats \
            tests/skills/gaia-deploy-adapter-dispatch.bats \
            tests/skills/gaia-deploy-checklist.bats \
            tests/skills/gaia-deploy-failures.bats \
            tests/skills/gaia-deploy.bats \
            tests/skills/gaia-dev-story-e41-s3-yolo-val-on-tdd-phases.bats \
            tests/skills/gaia-dev-story-figma-degrade.bats \
            tests/skills/gaia-dev-story-planning-gate.bats \
            tests/skills/gaia-dev-story-step2b-atdd.bats \
            tests/skills/gaia-dev-story-step7b-val.bats \
            tests/skills/gaia-dev-story-three-option-prompt.bats \
            tests/skills/gaia-dev-story-yolo-plan-loop.bats \
            tests/skills/gaia-edit-test-plan.bats \
            tests/skills/gaia-editorial-prose.bats \
            tests/skills/gaia-editorial-structure.bats \
            tests/skills/gaia-fill-test-gaps.bats \
            tests/skills/gaia-memory-hygiene-hints.bats \
            tests/skills/gaia-mobile-testing.bats \
            tests/skills/gaia-nfr.bats \
            tests/skills/gaia-perf-testing-hints.bats \
            tests/skills/gaia-perf-testing.bats \
            tests/skills/gaia-post-deploy.bats \
            tests/skills/gaia-refresh-ground-truth-hints.bats \
            tests/skills/gaia-release-plan.bats \
            tests/skills/gaia-review-deps-hints.bats \
            tests/skills/gaia-review-mobile.bats \
            tests/skills/gaia-rollback-plan.bats \
            tests/skills/gaia-shell-idioms.bats \
            tests/skills/gaia-teach-testing-hints.bats \
            tests/skills/gaia-teach-testing.bats \
            tests/skills/gaia-test-framework.bats \
            tests/skills/gaia-triage-findings-e41-s5-yolo-auto-apply.bats \
            tests/skills/gaia-triage-findings-reproduction-policy.bats \
            tests/skills/lint-skill-frontmatter.bats \
            tests/skills/validate-plan-structure.bats
      - name: Run /gaia-add-feature assessment-doc-bypass-check bats suite
        # Anti-pattern check that scans every /gaia-add-feature assessment-doc
        # emission for three Val-gate bypass smoking-gun strings (with
        # backtick-tolerant regex). The bats file uses synthetic fixtures under
        # tests/fixtures/ and skips the live-corpus tests when
        # GAIA_PROJECT_ROOT_DOCS is unset — CI only checks out gaia-framework/
        # and the live assessment-AF-*.md corpus sits at project-root, OUTSIDE
        # this checkout (per CLAUDE.md "Non-git project-root workspace").
        # Step MUST FAIL the build on non-zero exit.
        run: |
          bats plugins/gaia/skills/gaia-add-feature/tests/assessment-doc-bypass-check.bats
      - name: Run /gaia-add-feature no-priority-flag-auto-set bats suite
        # Regression-guard check that asserts the SKILL.md and supporting
        # scripts contain no conditional that auto-sets
        # `priority_flag: "next-sprint"` on stories created via cascade.
        # Triage classifies priority, /gaia-sprint-plan sequences.
        # Auto-flagging at cascade time pre-empts sprint-plan's authority.
        # Step MUST FAIL the build on non-zero exit.
        run: |
          bats plugins/gaia/skills/gaia-add-feature/tests/no-priority-flag-auto-set.bats
      - name: Run /gaia-meeting stdout-sentinel-forbid bats suite
        # Anti-pattern check that scans the /gaia-meeting SKILL.md
        # yield-boundary procedure sections for forbidden stdout-sentinel
        # patterns (`<<YIELD-STOP`, `<<TURN-END`). The script-side sentinel
        # mechanism was empirically defeated by harness Auto Mode; the
        # substrate-correct primitive is `AskUserQuestion`. The bats file
        # uses synthetic fixtures under tests/fixtures/ and the live SKILL.md
        # as a forward-looking guard.
        # Step MUST FAIL the build on non-zero exit.
        run: |
          bats plugins/gaia/skills/gaia-meeting/tests/gaia-meeting-stdout-sentinel-forbid.bats
      - name: Run /gaia-meeting user-as-attendee bats suite
        # Verifies the user-as-first-class-attendee carve-out in
        # `scripts/resolve-invitees.sh`: when `--invitees` contains a
        # user-token (`me` / `user` / case-insensitive resolved-user-name),
        # the token is preserved in the resolved CSV (not dropped) and the
        # `session-state.sh user_attendance` flag is set. The previous
        # silent-drop / WARNING design is replaced by the explicit attendee
        # path.
        # Step MUST FAIL the build on non-zero exit.
        run: |
          bats plugins/gaia/skills/gaia-meeting/tests/user-as-attendee.bats

  bats-script-refs-lint:
    # Sweep linter that catches bats files referencing scripts that have been
    # deleted from plugins/gaia/scripts/ or plugins/gaia/skills/*/scripts/.
    # The gaia-framework/tests/ and gaia-framework/plugins/gaia/tests/ trees
    # are disjoint (zero overlap) but both ship and run in CI, so a script
    # deletion under the canonical scripts roots can leave dangling .bats
    # references in either tree. The linter is pure bash + awk, sub-second
    # runtime.
    name: bats-script-refs-lint
    runs-on: ubuntu-latest
    timeout-minutes: 2  # trivial scan — keep budget tight
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
      - name: Run bats script-reference sweep linter
        run: |
          chmod +x plugins/gaia/scripts/lint-bats-script-refs.sh
          plugins/gaia/scripts/lint-bats-script-refs.sh --root .

  cluster-4-e2e:
    name: cluster-4-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 5  # enforce 5-minute wall-clock budget
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
      - uses: mig4/setup-bats@af9a00deb21b5d795cabfeaa8d9060410377686d  # v1.2.0
        with:
          bats-version: 1.10.0
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Run e2e tests
        run: bats tests/e2e/cluster-4-analysis-e2e.bats
      - name: Generate pass/fail report
        if: always()
        run: |
          chmod +x tests/e2e/generate-report.sh
          bash tests/e2e/generate-report.sh /tmp/cluster-4-report.md "$PWD"
          cat /tmp/cluster-4-report.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload e2e report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cluster-4-e2e-report
          path: /tmp/cluster-4-report.md
          if-no-files-found: ignore

  cluster-5-parity:
