name: adr-048-guard

# Two independent checks run on every PR to staging or main:
#
#   1. Dead-reference scan — rejects PRs that introduce active-code references
#      to legacy-engine paths (workflow.xml, core/protocols/, .resolved/,
#      4 retired _config/ manifests) AND the retired slash-command file-path
#      forms (.claude/commands/gaia-*.md, plugins/gaia/commands/gaia-*.md)
#      unless the `program-closing` label is applied AND all 12 cluster-gate
#      stories are done + 6x PASSED.
#
#   2. Commands-guard — unconditional, always runs. Rejects any PR that
#      reintroduces a gaia-*.md file under the retired plugins/gaia/commands/
#      directory. This restriction is permanent, not closing-only.
#
# Canonical scan: plugins/gaia/scripts/dead-reference-scan.sh
# Canonical gate: plugins/gaia/scripts/verify-cluster-gates.sh
# Commands guard: plugins/gaia/scripts/commands-guard.sh

on:
  pull_request:
    branches: [staging, main]
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  guard:
    name: adr-048-guard
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
        with:
          fetch-depth: 1

      - name: Ensure scripts are executable
        run: |
          chmod +x plugins/gaia/scripts/dead-reference-scan.sh
          chmod +x plugins/gaia/scripts/verify-cluster-gates.sh
          chmod +x plugins/gaia/scripts/commands-guard.sh

      - name: Run commands-guard (unconditional)
        run: |
          if ! plugins/gaia/scripts/commands-guard.sh --project-root . ; then
            echo "::error::Commands regression: plugins/gaia/commands/ was retired and MUST NOT be repopulated. See error output above."
            exit 1
          fi

      - name: Run dead-reference-scan
        id: deadref
        run: |
          if plugins/gaia/scripts/dead-reference-scan.sh --project-root . ; then
            echo "clean=true" >> "$GITHUB_OUTPUT"
          else
            echo "clean=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for program-closing label
        id: label
        run: |
          labels='${{ toJSON(github.event.pull_request.labels.*.name) }}'
          if echo "$labels" | grep -q '"program-closing"'; then
            echo "has_label=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_label=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Pass — scan is clean
        if: steps.deadref.outputs.clean == 'true'
        run: |
          echo "dead-reference-scan: CLEAN — guard passes."

      - name: Reject — legacy refs without program-closing label
        if: steps.deadref.outputs.clean == 'false' && steps.label.outputs.has_label == 'false'
        run: |
          echo "::error::This PR introduces active-code references to legacy-engine paths."
          echo "::error::Either scrub the reference, add a fallback, or add the 'program-closing' label AND ensure all cluster gates are PASSED."
          exit 1

      - name: Verify cluster gates when program-closing label is set
        if: steps.deadref.outputs.clean == 'false' && steps.label.outputs.has_label == 'true'
        run: |
          echo "program-closing label detected — re-verifying all 12 cluster gates..."
          if plugins/gaia/scripts/verify-cluster-gates.sh --project-root . ; then
            echo "All cluster gates PASSED — guard accepts the program-closing PR."
          else
            echo "::error::program-closing label is set BUT one or more cluster gates are not PASSED."
            echo "::error::The label alone is insufficient — all 12 cluster gates must be done + 6x PASSED."
            exit 1
          fi
