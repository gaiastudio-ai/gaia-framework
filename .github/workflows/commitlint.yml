name: commitlint

on:
  pull_request:
    branches: [main, staging]

jobs:
  lint-pr-title:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.mjs
          # Validate PR title (squash-merge normalizes individual commits)
          # The action validates the PR title as the commit message
          failOnWarnings: false
          # commitDepth: 0 scans only the PR HEAD
          # commit. The prior `commitDepth: 1` value caused wagoid to
          # walk merge commits and re-lint the previous staging→main
          # merge subject — flaking PRs whose own HEAD was perfectly
          # conventional-commits compliant. commitDepth: 0 confines the
          # lint to exactly the commit being merged. Documented fallback:
          # swap to `amannn/action-semantic-pull-request@v5` which
          # validates the PR title directly.
          commitDepth: 0
