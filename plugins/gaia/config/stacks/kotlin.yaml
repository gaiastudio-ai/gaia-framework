# kotlin.yaml — Kotlin mobile stack definition
#
# Mobile platform: Android. Targets native Android development with Gradle
# (Kotlin DSL or Groovy DSL). Adapter IDs reference Kotlin/Android-specific
# static and dynamic tooling.
#
# Source spec: .gaia/artifacts/planning-artifacts/decisions/gaia-review-system-final-report.md
# §4.1, §5.7, §7.2.1.

name: kotlin
language: Kotlin
platform: [android]
build_tool: gradle
package_manager: gradle

linters:
  - Detekt
  - ktlint

formatters:
  - ktlint

test_frameworks:
  - JUnit5
  - Espresso

adapters:
  static:
    - detekt
    - ktlint
  dynamic:
    - espresso
