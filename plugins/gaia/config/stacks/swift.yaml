# swift.yaml — Swift mobile stack definition
#
# Mobile platform: iOS. Targets native iOS development with Swift Package
# Manager and the Apple toolchain (xcodebuild). Adapter IDs reference Swift-
# specific static and dynamic tooling.
#
# Source spec: .gaia/artifacts/planning-artifacts/decisions/gaia-review-system-final-report.md
# §4.1, §5.7, §7.2.1.

name: swift
language: Swift
platform: [ios]
build_tool: xcodebuild
package_manager: spm

linters:
  - SwiftLint

formatters:
  - SwiftFormat

test_frameworks:
  - XCTest
  - swift-testing

adapters:
  static:
    - swiftlint
    - swiftformat
  dynamic:
    - xcuitest
