# input to parse during local smoke testing. E28-S18 (config split per ADR-044)
# will replace this file with the canonical schema and real values.
#
# Schema: flat top-level keys (no nesting) so POSIX shell parsers can read it.
# Fields are documented in plugins/gaia/scripts/resolve-config.sh header.

