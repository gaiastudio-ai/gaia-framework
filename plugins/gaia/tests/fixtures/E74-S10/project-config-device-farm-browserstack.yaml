# Test fixture: project config with BrowserStack device-farm adapter.
# AF-2026-05-17-10: platforms: declared so the new mobile-platforms gate passes.
platforms:
  - ios
  - android

test_execution_bridge:
  bridge_enabled: true
device_farm:
  adapter: browserstack
device_targets:
  os_versions: ["14"]
  form_factors: ["phone", "tablet"]
  screen_sizes: ["default"]
