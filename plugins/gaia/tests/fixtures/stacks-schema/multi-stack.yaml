# Multi-stack 3-stack monorepo fixture — models the case where /gaia-init
# asks the per-stack `path` prompt once per stack (Test Scenario 4). Each
# stack carries `path` + a mix of the new fields. Validates with all new
# fields populated across multiple entries.
project_root: /tmp/gaia
project_path: /tmp/gaia/app
memory_path: /tmp/gaia/_memory
checkpoint_path: /tmp/gaia/_memory/checkpoints
installed_path: /tmp/gaia/_gaia
framework_version: 1.176.0
date: 2026-05-25
stacks:
  - name: api
    language: go
    paths: ["services/api/**"]
    path: services/api
    excludes: [".env", "secrets/"]
    cross_refs: ["shared"]
    ignore_nested_manifests: true
  - name: web
    language: typescript
    paths: ["apps/web/**"]
    path: apps/web
    excludes: [".env.*"]
    cross_refs: ["shared", "api"]
    ignore_nested_manifests: false
  - name: shared
    language: typescript
    paths: ["packages/shared/**"]
    path: packages/shared
    excludes: []
    cross_refs: []
    ignore_nested_manifests: true
