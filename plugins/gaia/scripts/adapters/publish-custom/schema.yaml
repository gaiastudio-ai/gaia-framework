# publish-custom adapter schema
#
# Per-channel sub-field schema co-located with the adapter.
# The canonical 4 required common fields (channel, registry, manifest,
# release_workflow) are enforced at the top level by project-config.schema.json.
# This file lists the additional per-channel sub-fields custom requires.

$schema: "http://json-schema.org/draft-07/schema#"
$id: "publish-custom-schema-v1"
title: "publish-custom sub-field schema"
description: "Sub-field requirements for distribution.channel: custom. Common fields are at the project-config.schema.json level."
type: object
required: [adapter_name]
properties:
  adapter_name: {type: string, pattern: "^[A-Za-z0-9_-]+$"}
