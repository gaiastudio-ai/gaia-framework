# publish-homebrew adapter schema (E99-S2 / FR-521 / ADR-112 §(d))
#
# Per-channel sub-field schema co-located with the adapter per ADR-112 §(d).
# The canonical 4 required common fields (channel, registry, manifest,
# release_workflow) are enforced at the top level by project-config.schema.json.
# This file lists the additional per-channel sub-fields homebrew requires.

$schema: "http://json-schema.org/draft-07/schema#"
$id: "publish-homebrew-schema-v1"
title: "publish-homebrew sub-field schema"
description: "Sub-field requirements for distribution.channel: homebrew per FR-522 + ADR-112 §(d). Common fields are at the project-config.schema.json level."
type: object
required: ["tap"]
properties:
  tap: {type: string, minLength: 1}
