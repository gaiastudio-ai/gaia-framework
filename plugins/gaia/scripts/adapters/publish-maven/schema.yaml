# publish-maven adapter schema
#
# Per-channel sub-field schema co-located with the adapter.
# The canonical 4 required common fields (channel, registry, manifest,
# release_workflow) are enforced at the top level by project-config.schema.json.
# This file lists the additional per-channel sub-fields maven requires.

$schema: "http://json-schema.org/draft-07/schema#"
$id: "publish-maven-schema-v1"
title: "publish-maven sub-field schema"
description: "Sub-field requirements for distribution.channel: maven. Common fields are at the project-config.schema.json level."
type: object
required: [group_id, artifact_id]
properties:
  group_id: {type: string, minLength: 1}
  artifact_id: {type: string, minLength: 1}
