# publish-github-releases adapter schema
#
# Per-channel sub-field schema co-located with the adapter.
# The canonical 4 required common fields (channel, registry, manifest,
# release_workflow) are enforced at the top level by project-config.schema.json.
# This file lists the additional per-channel sub-fields github-releases requires.

$schema: "http://json-schema.org/draft-07/schema#"
$id: "publish-github-releases-schema-v1"
title: "publish-github-releases sub-field schema"
description: "Sub-field requirements for distribution.channel: github-releases. Common fields are at the project-config.schema.json level."
type: object
required: [repo]
properties:
  repo: {type: string, minLength: 1}
