# publish-container-registry adapter schema
#
# Per-channel sub-field schema co-located with the adapter.
# The canonical 4 required common fields (channel, registry, manifest,
# release_workflow) are enforced at the top level by project-config.schema.json.
# This file lists the additional per-channel sub-fields container-registry requires.

$schema: "http://json-schema.org/draft-07/schema#"
$id: "publish-container-registry-schema-v1"
title: "publish-container-registry sub-field schema"
description: "Sub-field requirements for distribution.channel: container-registry. Common fields are at the project-config.schema.json level."
type: object
required: [image_name, tag_strategy]
properties:
  image_name: {type: string, minLength: 1}
  tag_strategy: {type: string, enum: [semver, sha, latest]}
