# Mode A Checkpoint Payload — Reference Schema
#
# This file is the canonical example of the structured payload that the
# orchestrator (main turn) threads between subagent re-dispatches under
# Mode A (ADR-093 §"Mode A Checkpoint Payload Schema"). It is NOT a
# runtime artifact — it is reference material consumed by skill authors
# when they author SKILL.md playbooks that orchestrate multi-dispatch
# workflows.
#
# Schema authority: ADR-093 (Architecture Decision Record).
# Consumed by:      heavy-procedural and conversational skills under Mode A.
# NOT consumed by:  Mode B (persistent teammates maintain continuity via
#                   their live session context; no payload threading).
#
# ---------------------------------------------------------------------------
# Required keys
# ---------------------------------------------------------------------------

# Skill identifier (the slash-command name without the leading slash).
# Path-safe — no slashes, no traversal sequences.
skill_id: gaia-create-story

# Monotonically incrementing integer, starts at 1 on the first dispatch
# within this skill execution. The orchestrator increments before each
# new Agent() call.
dispatch_sequence: 3

# Always the literal string "mode_a" for this payload class. Reserved
# for future schema evolution.
orchestration_mode: mode_a

# What this dispatch is asking the sub-agent to do.
current_task:
  # The persona being invoked. Must match a subagent definition under
  # plugins/gaia/agents/<name>.md (with the "gaia:" prefix in the
  # Agent() subagent_type arg).
  agent_type: gaia:pm

  # The current step in the SKILL.md playbook.
  step_id: step-3-elaborate-product-questions

  # Human-readable but agent-targeted instruction. Should be precise
  # about expected output shape (e.g., "return Q1/Q2/Q3 answers as a
  # structured JSON object with keys edge_cases, ac_split, stakeholder_notes").
  instruction: |
    Read epics-and-stories.md for story E54-S7 and answer three
    questions from a product lens: (Q1) edge cases, (Q2) AC must-have
    vs nice-to-have split, (Q3) stakeholder notes. Return as structured
    JSON.

  # Optional: longer-form context describing why this dispatch is happening.
  # Omitted when the instruction is self-contained.
  step_description: |
    Story E54-S7 elaboration. Q1/Q2/Q3 answers feed the architecture
    dispatch (step 4) which feeds the merge step (step 5).

# Outputs from prior dispatches within this skill execution. The
# orchestrator appends to this array after each successful Agent() call.
# Sub-agents on later dispatches read this array to understand what was
# done before them.
prior_outputs:
  - agent_type: gaia:pm
    step_id: step-3-elaborate-product-questions
    summary: "Derek's answers to Q1/Q2/Q3 for story E54-S7"
    artifacts_created: []
    findings: []
    verdict: completed
  - agent_type: gaia:architect
    step_id: step-4-architectural-review
    summary: "Theo's architectural assessment of Derek's Q1 edge cases"
    artifacts_created: []
    findings:
      - severity: WARNING
        scope: "edge case Q1c — concurrent reads"
        note: "Conflicts with current cache layer assumptions"
    verdict: completed

# Current iteration counter within an inner loop (e.g., Val auto-fix
# loop). Starts at 1. Increments per loop iteration. Reset to 1 on
# entering a new loop. The orchestrator HALTs when iteration_count
# exceeds max_iterations.
iteration_count: 1

# ---------------------------------------------------------------------------
# Optional keys
# ---------------------------------------------------------------------------

# The /gaia-add-feature feature_id this skill execution traces to, when
# applicable. Omitted for direct invocations not driven by a feature.
feature_id: AF-2026-05-11-1

# Findings from earlier dispatches that the current dispatch should
# consider but not re-evaluate. Often used when threading a reviewer's
# verdict into a fix-loop iteration.
prior_findings:
  - source: gaia:validator
    severity: WARNING
    summary: "Story file lacks acceptance criteria for edge case Q1c"

# Loop ceiling for fix-loops. Default 3 per ADR-058 / ADR-093.
max_iterations: 3
